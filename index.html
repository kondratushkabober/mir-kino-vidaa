<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мир Кино • Лаунчер</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0f1e, #1a1a2e);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.03) 40px, rgba(255,255,255,0.03) 41px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }

    .header {
      text-align: center;
      margin-bottom: 50px;
      z-index: 1;
    }

    .launcher-badge {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      color: #ccc;
      padding: 8px 24px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 52px;
      font-weight: 700;
      margin-bottom: 14px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }

    .subtitle {
      font-size: 22px;
      opacity: 0.85;
      max-width: 720px;
      line-height: 1.45;
    }

    .cards {
      display: flex;
      gap: 35px;
      justify-content: center;
      flex-wrap: wrap;
      z-index: 1;
      width: 100%;
      max-width: 1280px;
    }

    .card {
      background: rgba(30, 30, 46, 0.95);
      border-radius: 28px;
      width: 340px;
      padding: 42px 32px;
      text-align: center;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border: 3px solid transparent;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7);
      cursor: pointer;
    }

    .card:hover, .card:focus {
      transform: translateY(-15px) scale(1.05);
      border-color: #00d4ff;
      box-shadow: 0 35px 70px rgba(0, 212, 255, 0.35);
    }

    .card.cf {
      border-color: #ffd700;
      background: linear-gradient(145deg, #2a261f, #3a3428);
      box-shadow: 0 25px 50px rgba(255, 215, 0, 0.25);
    }

    .region-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #1f1f2e;
      color: #fff;
      font-size: 32px;
      font-weight: 700;
      width: 78px;
      height: 78px;
      line-height: 78px;
      border-radius: 50%;
      margin-bottom: 28px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    .card.cf .region-badge {
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      color: #000;
    }

    .card-title {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 14px;
    }

    .card-desc {
      font-size: 19px;
      opacity: 0.85;
      line-height: 1.5;
      min-height: 88px;
    }

    .launch-btn {
      margin-top: 38px;
      padding: 18px 56px;
      font-size: 23px;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    .launch-btn.normal {
      background: #333;
      color: #fff;
    }

    .launch-btn.cf {
      background: linear-gradient(90deg, #ffd700, #ffcc00);
      color: #000;
    }

    .launch-btn:hover, .launch-btn:focus {
      transform: scale(1.1);
    }

    .reset-btn {
      margin-top: 70px;
      padding: 14px 40px;
      background: rgba(255,255,255,0.08);
      color: #bbb;
      border: 2px solid #555;
      border-radius: 50px;
      font-size: 20px;
      cursor: pointer;
      z-index: 1;
    }

    .reset-btn:hover {
      background: #ff4444;
      border-color: #ff4444;
      color: white;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="launcher-badge">LAUNCHER В МИР-КИНО</div>
    <h1>Выберите регион</h1>
    <p class="subtitle">
      Лаунчер для быстрого перехода между регионами для приложения Мир-Кино.<br>
      Управление заточено под ТВ-пульт.
    </p>
  </div>

  <div class="cards" id="cards"></div>

  <button class="reset-btn" onclick="resetMirror()">🔄 Сбросить выбор</button>

  <script>
    const mirrors = [
      { id: "eu", code: "EU", title: "Европа", desc: "Приложение для европейского региона.", url: "https://eu.mir-kino.pp.ru/" },
      { id: "cf", code: "CF", title: "CloudFlare CDN", desc: "Приложение работающее через балансер CloudFlare", url: "https://cf-eu.mir-kino.pp.ru/", highlight: true },
      { id: "ru", code: "RU", title: "Ру регион", desc: "Приложение для ru региона.", url: "https://ru.mir-kino.pp.ru/" }
    ];

    function renderCards() {
      const container = document.getElementById('cards');
      container.innerHTML = mirrors.map(m => {
        const isCF = m.highlight;
        return `
          <div class="card ${isCF ? 'cf' : ''}" tabindex="0" onclick="selectMirror('${m.url}')" 
               onkeydown="if(event.key==='Enter') selectMirror('${m.url}')">
            <div class="region-badge">${m.code}</div>
            <div class="card-title">${m.title}</div>
            <div class="card-desc">${m.desc}</div>
            <button class="launch-btn ${isCF ? 'cf' : 'normal'}">ЗАПУСТИТЬ</button>
          </div>
        `;
      }).join('');
    }

    function selectMirror(url) {
      localStorage.setItem('lastMirror', url);
      window.location.href = url;
    }

    function resetMirror() {
      if (confirm('Сбросить сохранённый регион и показать выбор снова?')) {
        localStorage.removeItem('lastMirror');
        window.location.reload();
      }
    }

    window.onload = () => {
      const saved = localStorage.getItem('lastMirror');
      if (saved) {
        window.location.href = saved;
      } else {
        renderCards();
      }
    };
  </script>
</body>
</html>
