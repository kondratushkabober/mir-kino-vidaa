<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мир Кино • Лаунчер</title>
  
  <script>
    // Мгновенный редирект БЕЗ ожидания загрузки DOM, CSS и шрифтов
    (function() {
      const saved = localStorage.getItem('lastMirror');
      if (saved) {
        window.location.href = saved;
      }
    })();
  </script>

  <style>
    @import url('https://googleapis.com');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0f1e, #1a1a2e) fixed;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 5rem 2.5rem 2.5rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.02) 40px, rgba(255,255,255,0.02) 41px);
      pointer-events: none;
      z-index: 0;
    }

    .header {
      text-align: center;
      margin-bottom: 5.5rem;
      z-index: 1;
    }

    .launcher-badge {
      display: inline-block;
      background: rgba(255,255,255,0.08);
      color: #b3b3b3;
      padding: 0.6rem 1.75rem;
      border-radius: 50px;
      font-size: 1.15rem;
      font-weight: 500;
      letter-spacing: 2px;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: 3.8rem;
      font-weight: 700;
      margin-bottom: 1rem;
      text-shadow: 0 4px 20px rgba(0,0,0,0.6);
      line-height: 1.1;
    }

    .subtitle {
      font-size: 1.6rem;
      opacity: 0.85;
      max-width: 860px;
      line-height: 1.45;
      margin: 0 auto;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 3rem;
      z-index: 1;
      width: 100%;
      max-width: 1480px;
    }

    .card {
      background: rgba(30, 30, 46, 0.95);
      color: #ffffff;
      font-family: inherit;
      border-radius: 32px;
      padding: 3.25rem 2.5rem;
      text-align: center;
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.25s, box-shadow 0.25s;
      border: 4px solid transparent;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
      cursor: pointer;
      min-height: 460px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .card:focus-visible,
    .card:hover {
      outline: none;
      transform: translateY(-12px) scale(1.03);
      border-color: #00d4ff;
      box-shadow: 0 30px 60px rgba(0, 212, 255, 0.25);
    }

    .region-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #1f1f2e;
      color: #fff;
      font-size: 3rem;
      font-weight: 700;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      margin-bottom: 2.25rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .card-title {
      font-size: 2.25rem;
      font-weight: 600;
      margin-bottom: 1.1rem;
      line-height: 1.2;
    }

    .card-desc {
      font-size: 1.4rem;
      opacity: 0.85;
      line-height: 1.5;
      margin-bottom: 2.5rem;
      flex-grow: 1;
    }

    .launch-btn {
      padding: 1.3rem 5rem;
      font-size: 1.75rem;
      font-weight: 700;
      color: #fff;
      background: #00d4ff;
      border: none;
      border-radius: 50px;
      pointer-events: none;
      width: 100%;
      max-width: 340px;
    }

    .card:focus-visible .launch-btn,
    .card:hover .launch-btn {
      background: #ffffff;
      color: #0f0f1e;
    }

    @media (min-width: 2560px) {
      html { font-size: 18px; }
      .cards { max-width: 1800px; gap: 4rem; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="launcher-badge">LAUNCHER В МИР-КИНО</div>
    <h1>Выберите сервер</h1>
    <p class="subtitle">
      Быстрый переход между зеркалами приложения Мир-Кино.<br>
      Управление оптимизировано для ТВ-пультов.
    </p>
  </header>

  <main class="cards" id="cards"></main>

  <script>
    const mirrors = [
      { id: "ru", code: "RU", title: "РФ", desc: "Сервер для Российской Федерации.", url: "https://mir-kino.pp.ru" },
      { id: "eu", code: "EU", title: "Европа", desc: "Сервер для Европейского региона.", url: "https://mir-kino.pp.ru" },
      { id: "cf", code: "CF", title: "CloudFlare CDN", desc: "Сервер через CloudFlare", url: "https://mir-kino.pp.ru" }
    ];

    function renderCards() {
      const container = document.getElementById('cards');
      
      container.innerHTML = mirrors.map(m => `
        <button class="card" data-url="${m.url}">
          <span class="region-badge">${m.code}</span>
          <span class="card-title">${m.title}</span>
          <span class="card-desc">${m.desc}</span>
          <span class="launch-btn">ЗАПУСТИТЬ</span>
        </button>
      `).join('');

      document.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', () => selectMirror(card.dataset.url));
      });

      // Автофокус на первую карточку при первом посещении
      const firstCard = document.querySelector('.card');
      if (firstCard) {
        setTimeout(() => firstCard.focus(), 50);
      }
    }

    function selectMirror(url) {
      localStorage.setItem('lastMirror', url);
      window.location.href = url;
    }

    // Рендерим интерфейс только если редирект в <head> не сработал
    document.addEventListener('DOMContentLoaded', renderCards);
  </script>
</body>
</html>
