<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Мир Кино • Лаунчер</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a0a14, #1a1a2e);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      overflow: hidden;
    }

    .header {
      text-align: center;
      margin-bottom: 50px;
    }

    .launcher-badge {
      background: rgba(255,255,255,0.12);
      color: #ddd;
      padding: 8px 22px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 14px;
      display: inline-block;
    }

    h1 { font-size: 34px; font-weight: 700; margin-bottom: 10px; }
    .subtitle { font-size: 17px; opacity: 0.9; max-width: 580px; }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 32px;
      width: 100%;
      max-width: 960px;
    }

    .card {
      background: rgba(28, 28, 45, 0.98);
      border: 4px solid transparent;
      border-radius: 26px;
      padding: 40px 30px;
      text-align: center;
      min-height: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: 0 15px 35px rgba(0,0,0,0.65);
    }

    /* ========== ФОКУС ДЛЯ ПУЛЬТА ========== */
    .card:focus {
      border-color: #00f0ff;
      box-shadow: 0 0 0 10px rgba(0, 240, 255, 0.45);
      transform: scale(1.09) translateY(-10px);
      outline: none;
      z-index: 10;
    }

    .region-badge {
      width: 88px;
      height: 88px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1f1f35;
      font-size: 38px;
      font-weight: 700;
      border-radius: 50%;
      margin-bottom: 26px;
    }

    .card-title { font-size: 25px; font-weight: 600; margin-bottom: 14px; }
    .card-desc { font-size: 16.5px; line-height: 1.45; opacity: 0.88; margin-bottom: 34px; flex-grow: 1; }

    .launch-btn {
      padding: 18px 60px;
      font-size: 20px;
      font-weight: 700;
      background: #00d4ff;
      color: #000;
      border: none;
      border-radius: 50px;
    }

    .launch-btn:focus { outline: 6px solid white; transform: scale(1.06); }
  </style>
</head>
<body>
  <div class="header">
    <div class="launcher-badge">МИР КИНО • LAUNCHER</div>
    <h1>Выберите сервер</h1>
    <p class="subtitle">Управляйте пультом: ← → ↑ ↓ и OK</p>
  </div>

  <div class="cards" id="cards"></div>

  <script>
    const mirrors = [
      { code: "RU", title: "Российский сервер", desc: "Основной сервер для РФ", url: "https://ru.mir-kino.pp.ru/" },
      { code: "EU", title: "Европейский сервер", desc: "Оптимально для Европы", url: "https://eu.mir-kino.pp.ru/" },
      { code: "CF", title: "CloudFlare CDN", desc: "Сервер через CloudFlare", url: "https://cf-eu.mir-kino.pp.ru/" }
    ];

    let currentIndex = 0;
    const cardsArray = [];

    function renderCards() {
      const container = document.getElementById('cards');
      container.innerHTML = '';

      mirrors.forEach((m, index) => {
        const cardHTML = `
          <div class="card" tabindex="0" data-index="${index}">
            <div class="region-badge">${m.code}</div>
            <div class="card-title">${m.title}</div>
            <div class="card-desc">${m.desc}</div>
            <button class="launch-btn" tabindex="-1">ЗАПУСТИТЬ</button>
          </div>
        `;
        container.insertAdjacentHTML('beforeend', cardHTML);
      });

      // Собираем все карточки
      document.querySelectorAll('.card').forEach((card, i) => {
        cardsArray[i] = card;
        card.addEventListener('click', () => selectMirror(mirrors[i].url));
        
        card.addEventListener('keydown', (e) => {
          handleKey(e, i);
        });
      });

      // Фокус на первую карточку
      if (cardsArray[0]) cardsArray[0].focus();
    }

    function handleKey(e, index) {
      let nextIndex = index;

      switch (e.key) {
        case 'ArrowRight':
          nextIndex = (index + 1) % cardsArray.length;
          break;
        case 'ArrowLeft':
          nextIndex = (index - 1 + cardsArray.length) % cardsArray.length;
          break;
        case 'ArrowDown':
          nextIndex = Math.min(index + 2, cardsArray.length - 1); // прыжок на следующую строку
          break;
        case 'ArrowUp':
          nextIndex = Math.max(index - 2, 0);
          break;
        case 'Enter':
        case ' ':
          selectMirror(mirrors[index].url);
          return;
      }

      if (nextIndex !== index && cardsArray[nextIndex]) {
        e.preventDefault();
        cardsArray[nextIndex].focus();
      }
    }

    function selectMirror(url) {
      localStorage.setItem('lastMirror', url);
      window.location.href = url;
    }

    window.onload = () => {
      const saved = localStorage.getItem('lastMirror');
      if (saved) {
        window.location.href = saved;
      } else {
        renderCards();
      }
    };
  </script>
</body>
</html>
