<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мир Кино • Лаунчер</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0f1e, #1a1a2e);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 80px 40px 40px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.03) 40px, rgba(255,255,255,0.03) 41px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }

    .header {
      text-align: center;
      margin-bottom: 90px;
      z-index: 1;
      max-width: 100%;
    }

    .launcher-badge {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      color: #ccc;
      padding: 10px 28px;
      border-radius: 50px;
      font-size: 19px;
      font-weight: 500;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 62px;
      font-weight: 700;
      margin-bottom: 16px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.6);
      line-height: 1.1;
    }

    .subtitle {
      font-size: 26px;
      opacity: 0.85;
      max-width: 860px;
      line-height: 1.45;
      margin: 0 auto;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      gap: 50px;
      justify-content: center;
      z-index: 1;
      width: 100%;
      max-width: 1480px;
    }

    .card {
      background: rgba(30, 30, 46, 0.95);
      border-radius: 32px;
      padding: 52px 40px;
      text-align: center;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      border: 4px solid transparent;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.7);
      cursor: pointer;
      outline: none;
      min-height: 460px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Фокус для пульта VIDAA */
    .card:focus,
    .card:focus-visible,
    .card:active {
      transform: translateY(-18px) scale(1.05);
      border-color: #00d4ff;
      box-shadow: 0 40px 80px rgba(0, 212, 255, 0.5);
      outline: 8px solid #00d4ff;
      outline-offset: 10px;
    }

    .card:hover {
      transform: translateY(-15px) scale(1.04);
      border-color: #00d4ff;
    }

    .region-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #1f1f2e;
      color: #fff;
      font-size: 48px;
      font-weight: 700;
      width: 110px;
      height: 110px;
      line-height: 110px;
      border-radius: 50%;
      margin-bottom: 36px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    .card-title {
      font-size: 36px;
      font-weight: 600;
      margin-bottom: 18px;
      line-height: 1.2;
    }

    .card-desc {
      font-size: 23px;
      opacity: 0.85;
      line-height: 1.5;
      margin-bottom: 40px;
      flex-grow: 1;
    }

    .launch-btn {
      padding: 22px 80px;
      font-size: 28px;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      width: 100%;
      max-width: 380px;
    }

    .launch-btn:focus,
    .launch-btn:focus-visible {
      outline: 8px solid #00d4ff;
      outline-offset: 8px;
      transform: scale(1.08);
    }

    /* 4K оптимизация */
    @media (min-width: 2560px) {
      body {
        padding-top: 120px;
      }
      .header {
        margin-bottom: 110px;
      }
      h1 {
        font-size: 72px;
      }
      .subtitle {
        font-size: 28px;
      }
      .card {
        min-height: 520px;
        padding: 60px 48px;
        border-radius: 36px;
      }
      .region-badge {
        width: 130px;
        height: 130px;
        line-height: 130px;
        font-size: 56px;
      }
      .card-title {
        font-size: 42px;
      }
      .card-desc {
        font-size: 25px;
      }
      .launch-btn {
        padding: 26px 90px;
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="launcher-badge">LAUNCHER В МИР-КИНО</div>
    <h1>Выберите сервер</h1>
    <p class="subtitle">
      Лаунчер быстрого перехода между серверами для приложения Мир-Кино.
    </p>
  </div>

  <div class="cards" id="cards"></div>

  <script>
    const mirrors = [
      { id: "ru", code: "RU", title: "РФ", desc: "Сервер для Российской Федерации.", url: "https://ru.mir-kino.pp.ru/" },
      { id: "eu", code: "EU", title: "Европа", desc: "Сервер для Европейского региона.", url: "https://eu.mir-kino.pp.ru/" },
      { id: "cf", code: "CF", title: "CloudFlare CDN", desc: "Сервер через CloudFlare", url: "https://cf-eu.mir-kino.pp.ru/" }
    ];

    function renderCards() {
      const container = document.getElementById('cards');
      container.innerHTML = mirrors.map(m => `
        <div class="card" tabindex="0" onclick="selectMirror('${m.url}')" 
             onkeydown="if(event.key==='Enter' || event.key===' ') selectMirror('${m.url}')">
          <div class="region-badge">${m.code}</div>
          <div class="card-title">${m.title}</div>
          <div class="card-desc">${m.desc}</div>
          <button class="launch-btn" tabindex="-1">ЗАПУСТИТЬ</button>
        </div>
      `).join('');
    }

    function selectMirror(url) {
      localStorage.setItem('lastMirror', url);
      window.location.href = url;
    }

    window.onload = () => {
      const saved = localStorage.getItem('lastMirror');
      if (saved) {
        window.location.href = saved;
      } else {
        renderCards();
      }
    };
  </script>
</body>
</html>
