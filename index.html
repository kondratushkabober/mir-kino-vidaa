<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мир Кино • Лаунчер</title>
  
  <!-- Finimalism — основной стиль, который ты дал -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/tedhinklater/finimalism@main/Finimalism12.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --skip-hide-duration: 8s;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0f1e, #1a1a2e);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow: hidden;
    }

    /* Логотип Мир Кино в шапке (как в твоём кастомном Jellyfin) */
    .header-logo {
      background-image: url('https://i.imgur.com/cNUYWM2.png') !important;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      width: 280px;
      height: 120px;
      margin-bottom: 20px;
      filter: drop-shadow(0 10px 30px rgba(0,0,0,0.6));
    }

    .launcher-badge {
      display: inline-block;
      background: rgba(255,255,255,0.08);
      color: #bbb;
      padding: 8px 28px;
      border-radius: 50px;
      font-size: 19px;
      font-weight: 600;
      letter-spacing: 3px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 54px;
      font-weight: 700;
      text-shadow: 0 4px 25px rgba(0,0,0,0.7);
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 23px;
      opacity: 0.9;
      max-width: 760px;
      line-height: 1.5;
      text-align: center;
    }

    .cards {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 60px;
      z-index: 2;
      width: 100%;
      max-width: 1300px;
    }

    .card {
      background: rgba(28, 28, 42, 0.95);
      border-radius: 28px;
      width: 360px;
      padding: 48px 36px 40px;
      text-align: center;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border: 3px solid transparent;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.75);
      cursor: pointer;
    }

    .card:hover, .card:focus {
      transform: translateY(-18px) scale(1.06);
      border-color: #00d4ff;
      box-shadow: 0 40px 80px rgba(0, 212, 255, 0.4);
    }

    .card.cf {
      border-color: #ffd700;
      background: linear-gradient(145deg, #2c2a22, #3f3a2b);
      box-shadow: 0 30px 65px rgba(255, 215, 0, 0.3);
    }

    .region-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #1f1f2e;
      color: #fff;
      font-size: 36px;
      font-weight: 700;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      margin-bottom: 32px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    .card.cf .region-badge {
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      color: #111;
    }

    .card-title {
      font-size: 30px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .card-desc {
      font-size: 20px;
      opacity: 0.9;
      line-height: 1.55;
      min-height: 95px;
    }

    .launch-btn {
      margin-top: 42px;
      padding: 20px 62px;
      font-size: 24px;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    .launch-btn.normal {
      background: #2a2a3a;
      color: #fff;
    }

    .launch-btn.cf {
      background: linear-gradient(90deg, #ffd700, #ffcc00);
      color: #111;
    }

    /* Блок с QR-кодом и текстом (точно как в твоём кастомном Jellyfin) */
    .qr-footer {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 23, 35, 0.97) 
                  url('https://i.postimg.cc/L8DYR0cV/Bez-nazvania.png') 
                  no-repeat center bottom / 110px;
      color: #c8d6f5;
      padding: 22px 32px 138px 32px;
      border-radius: 22px;
      font-size: 1.1rem;
      line-height: 1.45;
      text-align: center;
      box-shadow: 0 15px 45px rgba(0, 0, 0, 0.9);
      border: 2px solid rgba(120, 175, 255, 0.5);
      max-width: 82%;
      white-space: pre-line;
      z-index: 10000;
      pointer-events: none;
    }

    .qr-footer:hover {
      background-color: rgba(28, 34, 55, 0.98);
      border-color: #8eb8ff;
    }

    .reset-btn {
      position: fixed;
      bottom: 30px;
      right: 40px;
      padding: 14px 36px;
      background: rgba(255,255,255,0.1);
      color: #bbb;
      border: 2px solid #555;
      border-radius: 50px;
      font-size: 21px;
      cursor: pointer;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div class="header-logo"></div>

  <div style="text-align: center; z-index: 2;">
    <div class="launcher-badge">LAUNCHER В МИР-КИНО</div>
    <h1>Выберите регион</h1>
    <p class="subtitle">
      Лаунчер для быстрого перехода между регионами для приложения Мир-Кино.<br>
      Управление заточено под ТВ-пульт.
    </p>
  </div>

  <div class="cards" id="cards"></div>

  <!-- QR-блок точно как в твоём Jellyfin -->
  <div class="qr-footer">
    Для регистрации<br>
    отсканируйте QR-код или перейдите по<br>
    ссылке:<br>
    <strong>mir-kino.pp.ru</strong>
  </div>

  <button class="reset-btn" onclick="resetMirror()">🔄 Сбросить выбор</button>

  <script>
    const mirrors = [
      { id: "eu", code: "EU", title: "Европа", desc: "Приложение для европейского региона.", url: "https://eu.mir-kino.pp.ru/" },
      { id: "cf", code: "CF", title: "CloudFlare CDN", desc: "Приложение работающее через балансер CloudFlare", url: "https://cf-eu.mir-kino.pp.ru/", highlight: true },
      { id: "ru", code: "RU", title: "Ру регион", desc: "Приложение для ru региона.", url: "https://ru.mir-kino.pp.ru/" }
    ];

    function renderCards() {
      const container = document.getElementById('cards');
      container.innerHTML = mirrors.map(m => {
        const isCF = m.highlight;
        return `
          <div class="card ${isCF ? 'cf' : ''}" tabindex="0" onclick="selectMirror('${m.url}')" 
               onkeydown="if(event.key==='Enter') selectMirror('${m.url}')">
            <div class="region-badge">${m.code}</div>
            <div class="card-title">${m.title}</div>
            <div class="card-desc">${m.desc}</div>
            <button class="launch-btn ${isCF ? 'cf' : 'normal'}">ЗАПУСТИТЬ</button>
          </div>
        `;
      }).join('');
    }

    function selectMirror(url) {
      localStorage.setItem('lastMirror', url);
      window.location.href = url;
    }

    function resetMirror() {
      if (confirm('Сбросить сохранённый регион и показать выбор снова?')) {
        localStorage.removeItem('lastMirror');
        window.location.reload();
      }
    }

    window.onload = () => {
      const saved = localStorage.getItem('lastMirror');
      if (saved) {
        window.location.href = saved;
      } else {
        renderCards();
      }
    };
  </script>
</body>
</html>
